# Paperclip AI Stack Integration Roadmap
# Date: 2026-03-20
# Goal: Integrate STAX AI infrastructure tools into Paperclip

version: "1.0.0"
last_updated: "2026-03-20"

project:
  name: "Paperclip AI Stack Integration"
  goal: "Connect Paperclip to deployed STAX AI services for memory, observability, tools, security, and code analysis"
  status: "in_progress"

# Integration initiatives grouped by phase
phases:
  - name: "Phase 1: Core Capabilities"
    priority: "critical"
    target_date: "2026-03-27"
    description: "Enable memory and observability - foundational for autonomous operations"
    initiatives:
      - id: "qdrant-integration"
        name: "Qdrant Vector Memory"
        priority: "critical"
        status: "todo"
        assignee: null
        description: "Integrate Qdrant for semantic memory storage and retrieval"
        value: "Knowledge Curator can build searchable knowledge base, agents recall context"
        endpoint: "http://qdrant.llm.svc.cluster.local:6333"
        dependencies: []
        tasks:
          - "Add qdrant-client to server dependencies"
          - "Create memory provider adapter for Qdrant"
          - "Design company-scoped collection schema"
          - "Implement memory storage (text -> vector)"
          - "Implement semantic search API"
          - "Integrate memory retrieval into agent execution"
          - "Add memory management UI"
          - "Write integration tests"
        estimated_effort: "2-3 days"

      - id: "langfuse-integration"
        name: "Langfuse Observability"
        priority: "critical"
        status: "todo"
        assignee: null
        description: "Track LLM costs, latency, and enable debugging via Langfuse"
        value: "Visibility into agent spend, debugging, cost optimization, budgeting"
        endpoint: "http://langfuse.llm.svc.cluster.local:3000"
        dependencies: []
        tasks:
          - "Add langfuse SDK to server dependencies"
          - "Initialize Langfuse client with STAX endpoint"
          - "Wrap litellm_gateway adapter with Langfuse traces"
          - "Track tokens, cost, latency per agent/company/issue"
          - "Store trace IDs for linking"
          - "Add Langfuse links to agent activity UI"
          - "Create cost reporting dashboard"
          - "Write integration tests"
        estimated_effort: "2-3 days"

  - name: "Phase 2: Infrastructure Tools"
    priority: "high"
    target_date: "2026-04-03"
    description: "Enable agents to interact with infrastructure via MCP tools"
    initiatives:
      - id: "mcp-gateway-integration"
        name: "MCP Gateway Tool Access"
        priority: "high"
        status: "todo"
        assignee: null
        description: "Connect agents to MCP tools for GitHub, K8s, Postgres, Prometheus"
        value: "Agents can query metrics, check GitHub, manage infrastructure directly"
        endpoint: "http://mcp-gateway.llm.svc.cluster.local:8080"
        dependencies: []
        mcp_servers:
          - "mcp-github.mcp-services.svc.cluster.local"
          - "mcp-kubernetes.mcp-services.svc.cluster.local"
          - "mcp-postgres-server.mcp-services.svc.cluster.local"
          - "mcp-prometheus.mcp-services.svc.cluster.local"
        tasks:
          - "Add MCP client SDK to server dependencies"
          - "Create MCP tool provider service"
          - "Define agent permission model for MCP tools"
          - "Map MCP servers to agent roles (SRE -> K8s/Prometheus, DevOps -> GitHub)"
          - "Expose MCP tools during agent execution"
          - "Log all MCP tool calls with provenance"
          - "Add MCP tool history to UI"
          - "Write integration tests"
        estimated_effort: "3-4 days"
        security_notes:
          - "Tool access gated by agent permissions"
          - "All calls logged with agent ID, task ID"
          - "Read-only tools first, write tools require approval"

  - name: "Phase 3: Security & Analysis"
    priority: "medium"
    target_date: "2026-04-10"
    description: "Add production safety and enhanced code analysis"
    initiatives:
      - id: "ai-firewall-integration"
        name: "AI Firewall Security Layer"
        priority: "medium"
        status: "todo"
        assignee: null
        description: "Route LLM calls through firewall for PII/injection detection"
        value: "Prevent PII leaks, block malicious prompts, audit interactions"
        endpoint: "http://ai-firewall.llm.svc.cluster.local:8000"
        dependencies: ["langfuse-integration"]
        tasks:
          - "Create ai-firewall proxy adapter wrapping litellm_gateway"
          - "Route LLM calls through firewall"
          - "Configure firewall policies per agent/company"
          - "Log blocked requests with reason"
          - "Add firewall bypass permission for trusted agents"
          - "Show firewall blocks in UI"
          - "Make firewall optional per-company setting"
          - "Write integration tests"
        estimated_effort: "2-3 days"
        deployment_notes:
          - "Optional per-company (default: enabled for production)"
          - "Can bypass for dev/testing companies"

      - id: "code-graph-integration"
        name: "Code Graph Semantic Analysis"
        priority: "medium"
        status: "todo"
        assignee: null
        description: "Enable semantic code analysis beyond text search"
        value: "Deep codebase understanding - dependencies, call graphs, architecture"
        endpoint: "http://code-graph.llm.svc.cluster.local:8097"
        dependencies: ["qdrant-integration"]
        tasks:
          - "Add code-graph client to server dependencies"
          - "Create code analysis tool service"
          - "Enable queries: find definitions, trace deps, find usages, call graphs"
          - "Integrate with execution workspace"
          - "Cache graph analysis per repo/commit"
          - "Enhance Knowledge Curator with code graph"
          - "Add code graph visualization to UI"
          - "Write integration tests"
        estimated_effort: "3-4 days"
        use_cases:
          - "Find all functions that call X"
          - "Show dependency tree for module Y"
          - "What files affected by changing interface Z?"

# Metrics for tracking success
success_metrics:
  phase_1:
    - "Agents successfully store and retrieve memories from Qdrant"
    - "All LLM calls tracked in Langfuse with cost attribution"
    - "Cost reporting dashboard shows agent spend breakdown"
  phase_2:
    - "SRE agent can query Prometheus and K8s via MCP tools"
    - "DevOps agent can check GitHub issues/PRs via MCP"
    - "All MCP tool calls logged and auditable"
  phase_3:
    - "AI Firewall blocks PII and malicious prompts"
    - "Knowledge Curator uses code graph for architecture analysis"
    - "Agents can trace dependencies and find usages"

# Technical notes
technical_notes:
  network:
    - "paperclip namespace already has allow-all-egress policy"
    - "All services in llm namespace are accessible"
    - "MCP services in mcp-services namespace"

  authentication:
    - "Qdrant: no auth required (cluster-internal)"
    - "Langfuse: check if auth required, may need API key"
    - "MCP Gateway: check auth requirements"
    - "AI Firewall: may need API key or service token"
    - "Code Graph: check auth requirements"

  deployment:
    - "All integrations deployed via Paperclip Pulumi stack"
    - "No changes required to AI service deployments"
    - "Network policies may need updates for mcp-services access"

# Risks and mitigations
risks:
  - risk: "Qdrant storage growing unbounded"
    mitigation: "Implement memory retention policy, automatic cleanup of old memories"

  - risk: "Langfuse adding latency to LLM calls"
    mitigation: "Async trace recording, batch API calls, monitor p99 latency"

  - risk: "MCP tools enabling destructive operations"
    mitigation: "Start with read-only tools, require approval for write operations"

  - risk: "AI Firewall blocking legitimate agent requests"
    mitigation: "Tunable policies, whitelist for known-good patterns, bypass permission"

  - risk: "Code Graph indexing taking too long"
    mitigation: "Background indexing, cache results, incremental updates"

# Open questions
open_questions:
  - "Does Langfuse require authentication? Need to check deployment"
  - "What's the API contract for code-graph service?"
  - "Which MCP tools should agents have by default?"
  - "Should AI Firewall be optional or mandatory?"
  - "How to handle memory search across multiple companies (multi-tenancy)?"
  - "Cost attribution model for MCP tool calls?"

# Next steps
next_actions:
  - "Start with Phase 1: Qdrant + Langfuse (highest value)"
  - "Check authentication requirements for all services"
  - "Design memory schema for Qdrant (company-scoped collections)"
  - "Design Langfuse trace metadata structure"
  - "Create feature branch for integrations"
