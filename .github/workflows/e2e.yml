name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      skip_llm:
        description: "Skip LLM-dependent assertions (default: true)"
        type: boolean
        default: true

jobs:
  e2e:
    runs-on: stax-browser
    timeout-minutes: 30
    env:
      STAPLE_E2E_SKIP_LLM: ${{ inputs.skip_llm && 'true' || 'false' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: always()
        continue-on-error: true
        uses: Anomalous-Ventures/devops/.github/actions/upload-s3@e2fb8bd888e72bdc648c4fdd988ebe03933e0e2f # main
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          access-key: ${{ secrets.MINIO_ACCESS_KEY }}
          secret-key: ${{ secrets.MINIO_SECRET_KEY }}
