name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ci:
    uses: Anomalous-Ventures/.github/.github/workflows/ci-nodejs.yml@main
    with:
      node-version: '22'
      package-manager: 'pnpm'
      working-directory: '.'
      run-tests: true
      run-docker-build: true
      docker-registry: 'harbor.spooty.io'
    secrets: inherit
